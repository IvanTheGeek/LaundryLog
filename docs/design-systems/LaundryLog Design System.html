  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 var(--cb-surface-base);\n  border: 1.5px solid var(--cb-border-default);\n  border-radius: var(--cb-radius-sm);\n  padding: var(--cb-space-2) var(--cb-space-2);\n  color: var(--cb-text-secondary);\n  font-family: var(--cb-font-body); cursor: pointer;\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;\n  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;\n}\n.ll-quickfill-chip:hover { background: var(--cb-amber-50); border-color: var(--cb-amber-200); color: var(--cb-amber-700); }\n.ll-quickfill-chip.ll-quickfill-chip--flash {\n  background: var(--ll-quickfill-bg);\n  border-color: var(--ll-quickfill-border);\n  color: var(--ll-quickfill-text);\n}\n.ll-quickfill-chip__amount { font-size: var(--cb-text-base); font-weight: var(--cb-weight-semibold); }\n.ll-quickfill-chip__sub { font-size: 0.6rem; opacity: 0.75; }\n\n/* ─ Entry Total ─ */\n.ll-entry-total { background: var(--cb-surface-sunken); padding: var(--cb-space-3) var(--cb-space-4); border-radius: var(--cb-radius-md); display: flex; justify-content: space-between; align-items: center; }\n.ll-entry-total__label { font-size: var(--cb-text-sm); font-weight: var(--cb-weight-semibold); color: var(--cb-text-secondary); text-transform: uppercase; letter-spacing: var(--cb-tracking-wide); }\n.ll-entry-total__value { font-size: var(--cb-text-2xl); font-weight: var(--cb-weight-bold); color: var(--cb-text-primary); font-family: var(--cb-font-body); }\n\n/* ─ Payment Chips ─ */\n.ll-payment-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--cb-space-2); }\n.ll-payment-chip {\n  border: 1.5px solid var(--cb-border-default);\n  background: var(--cb-surface-raised);\n  border-radius: var(--cb-radius-md);\n  padding: var(--cb-space-3) var(--cb-space-2);\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;\n  font-family: var(--cb-font-body); font-size: var(--cb-text-sm); font-weight: var(--cb-weight-semibold);\n  color: var(--cb-text-secondary); cursor: pointer; min-height: 58px;\n  transition: all var(--cb-duration-fast);\n}\n.ll-payment-chip__icon { font-size: 1rem; line-height: 1; }\n.ll-payment-chip:hover { border-color: var(--cb-border-strong); color: var(--cb-text-primary); }\n.ll-payment-chip--selected { background: var(--cb-accent-subtle); border-color: var(--cb-border-accent); color: var(--cb-text-accent); }\n\n/* ─ Detail Chips (card sub-selection) ─ */\n.ll-detail-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--cb-space-2); }\n.ll-detail-chip { border: 1.5px solid var(--cb-border-default); background: var(--cb-surface-raised); border-radius: var(--cb-radius-md); padding: var(--cb-space-3) var(--cb-space-3); font-family: var(--cb-font-body); font-size: var(--cb-text-sm); font-weight: var(--cb-weight-semibold); color: var(--cb-text-secondary); cursor: pointer; text-align: center; transition: all var(--cb-duration-fast); }\n.ll-detail-chip:hover { border-color: var(--cb-border-strong); color: var(--cb-text-primary); }\n.ll-detail-chip--selected { background: var(--cb-accent-subtle); border-color: var(--cb-border-accent); color: var(--cb-text-accent); }\n\n/* ─ Status Chip Row ─ */\n.ll-status-row { display: flex; gap: var(--cb-space-2); align-items: center; }\n.ll-status-chip {\n  display: inline-flex; align-items: center; gap: 4px;\n  padding: 4px var(--cb-space-2);\n  background: rgba(255,255,255,0.9);\n  border-radius: var(--cb-radius-pill);\n  font-size: var(--cb-text-xs); font-weight: var(--cb-weight-semibold);\n  color: var(--cb-text-secondary); white-space: nowrap;\n}\n[data-theme=\"dark\"] .ll-status-chip { background: rgba(255,255,255,0.1); }\n.ll-status-chip__mark--ready   { color: var(--ll-status-ready-color); font-weight: 800; }\n.ll-status-chip__mark--missing { color: var(--ll-status-missing-color); font-weight: 800; }\n\n/* ─ Submit Button variants ─ */\n.ll-btn {\n  width: 100%; border: none; border-radius: var(--cb-radius-lg);\n  min-height: 60px; padding: var(--cb-space-3) var(--cb-space-4);\n  font-family: var(--cb-font-body); font-size: var(--cb-text-md);\n  font-weight: var(--cb-weight-bold); cursor: pointer;\n  transition: all var(--cb-duration-normal) var(--cb-ease-standard);\n  display: flex; align-items: center; justify-content: center; gap: var(--cb-space-2);\n}\n.ll-btn--primary { background: linear-gradient(135deg, var(--ll-header-from) 0%, var(--ll-header-to) 100%); color: var(--ll-header-text); box-shadow: 0 4px 14px rgba(0,0,0,0.14); }\n.ll-btn--primary:hover { filter: brightness(1.04); box-shadow: 0 6px 18px rgba(0,0,0,0.18); }\n.ll-btn--disabled { background: var(--cb-border-default); color: var(--cb-text-muted); cursor: not-allowed; box-shadow: none; }\n.ll-btn--success { background: linear-gradient(135deg, var(--cb-green-500) 0%, var(--cb-green-700) 100%); color: white; box-shadow: 0 4px 14px rgba(34,197,94,0.25); }\n\n/* ─ Session Summary Bar ─ */\n.ll-session-bar { background: var(--ll-session-bg); border: 1.5px solid var(--ll-session-border); border-radius: var(--cb-radius-md); padding: var(--cb-space-3) var(--cb-space-4); display: flex; justify-content: space-between; align-items: center; }\n.ll-session-bar__label { font-size: var(--cb-text-sm); font-weight: var(--cb-weight-semibold); color: var(--ll-session-text); text-transform: uppercase; letter-spacing: var(--cb-tracking-wide); }\n.ll-session-bar__value { font-size: var(--cb-text-xl); font-weight: var(--cb-weight-bold); color: var(--ll-session-text); }\n\n/* ─ Feedback Banner ─ */\n.ll-feedback {\n  background: var(--ll-feedback-bg); border: 1px solid var(--ll-feedback-border);\n  color: var(--ll-feedback-text); border-radius: var(--cb-radius-md);\n  padding: var(--cb-space-3) var(--cb-space-4);\n  font-size: var(--cb-text-sm); font-weight: var(--cb-weight-bold);\n}\n\n/* ─ Entry Card ─ */\n.ll-entry-card { background: var(--cb-surface-raised); border-radius: var(--cb-radius-lg); padding: var(--cb-space-4); box-shadow: var(--cb-shadow-xs); border-left: 3px solid var(--ll-entry-accent-l); border: 1px solid var(--cb-border-default); border-left-width: 3px; width: 100%; box-sizing: border-box; }\n.ll-entry-card--logged { border-left-color: var(--ll-entry-accent-l-logged); }\n.ll-entry-card__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--cb-space-1); }\n.ll-entry-card__amount { font-size: var(--cb-text-xl); font-weight: var(--cb-weight-bold); color: var(--cb-text-primary); }\n.ll-entry-card__time { font-size: var(--cb-text-xs); color: var(--cb-text-muted); }\n.ll-entry-card__detail { font-size: var(--cb-text-sm); color: var(--cb-text-secondary); }\n\n/* ─ Location Input ─ */\n.ll-location-row { display: flex; gap: var(--cb-space-2); align-items: flex-end; }\n.ll-location-input { flex: 1; }\n.ll-location-info { font-size: var(--cb-text-xs); color: var(--cb-text-muted); margin-top: 4px; }\n.ll-gps-btn { width: 52px; height: 52px; flex-shrink: 0; border: 1.5px solid var(--ll-gps-btn-border); background: var(--ll-gps-btn-bg); border-radius: var(--cb-radius-md); font-size: 1.375rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--cb-duration-fast); }\n.ll-gps-btn:hover { background: var(--cb-accent-subtle); border-color: var(--cb-border-accent); }\n.ll-text-input { width: 100%; padding: var(--cb-space-3) var(--cb-space-4); border: 1.5px solid var(--cb-border-default); border-radius: var(--cb-radius-md); font-size: var(--cb-text-base); font-weight: var(--cb-weight-medium); color: var(--cb-text-primary); background: var(--cb-surface-raised); font-family: var(--cb-font-body); transition: border-color var(--cb-duration-fast); }\n.ll-text-input:focus { outline: none; border-color: var(--cb-accent); box-shadow: var(--cb-focus-ring); }\n.ll-text-input::placeholder { color: var(--cb-text-muted); }\n\n/* ─ Composite form card ─ */\n.ll-form-surface { border: 1px solid var(--cb-border-default); border-radius: var(--cb-radius-xl); overflow: hidden; box-shadow: var(--cb-shadow-md); width: 100%; max-width: 360px; }\n.ll-form-body { padding: var(--cb-space-4); background: var(--cb-surface-base); display: flex; flex-direction: column; gap: var(--cb-space-3); }\n.ll-two-col { display: grid; grid-template-columns: 1fr; gap: var(--cb-space-3); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"ds-layout\">\n\n<!-- ── Sidebar Nav ── -->\n<nav class=\"ds-nav\">\n  <div class=\"ds-nav-logo\">\n    <a class=\"cb-logo\" href=\"#\" onclick=\"return false\">\n      <span class=\"cb-logo-mark\"><svg width=\"98\" height=\"60\" viewBox=\"0 0 2048 2048\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><path fill=\"#f3ba31\" d=\"m 936.575,382.246 c 23.621,-17.307 73.905,-57.265 99.595,-67.723 37.81,-15.392 197.57,4.703 241.78,11.511 158.65,24.433 325.2,79.651 455.45,175.131 29.54,21.654 59.29,45.167 81.09,74.946 14.82,20.238 23.01,43.48 26.79,68.153 2.92,19.08 2.11,38.733 2.09,57.993 l -0.16,79.876 c -0.08,76.797 1.5,159.466 -0.23,235.747 2.0718,101.6838 0.5753,102.4495 0,245.33 l 0.1,91.52 c -0.03,40.96 5.6,78.54 -25.49,110.24 -10.94,11.2 -24.86,19.05 -40.11,22.61 -29.23,6.53 -69.13,11.97 -99.23,17.04 l -203.89,33.96 -669.865,111.54 -373.557,61.88 -102.873,17.19 c -20.399,3.43 -42.523,7.91 -63.072,8.82 -15.6,0.68 -32.924,-7.05 -43.47,-18.25 -13.733,-14.31 -15.907,-27.68 -17.392,-46.52 -0.207,-73.07 -0.883,-152.14 0.922,-225.17 58.47,11.02 111.839,-9.76 144.82,-60.03 20.595,-31.52 27.683,-69.99 19.677,-106.79 -7.722,-36.53 -30.798,-67.3 -62.077,-87.25 -30.437,-19.57 -67.427,-26.17 -102.754,-18.34 l 0.269,-229.742 c 4.756,-40.307 22.178,-65.131 57.32,-85.283 40.837,-31.814 90.917,-65.442 133.662,-95.891 L 639.418,591.846 c 8.563,4.916 15.541,10.404 25.04,15.581 34.677,18.902 87.617,22.914 125.401,10.919 23.984,-5.659 51.63,-21.948 66.473,-42.186 1.114,-1.52 2.162,-3.088 3.143,-4.698 7.91,-13.18 11.179,-30.634 6.626,-45.316 -8.92, doc-header\">\n    <div>\n      <div style=\"display:flex; align-items:center; gap: 12px; margin-bottom: 8px;\">\n        <span class=\"ds-eyebrow\">LaundryLog · Extension<\u002Fspan>\n        <a class=\"ds-parent-badge\" href=\"CheddarBooks Design System.html\">↑ CheddarBooks Design System<\u002Fa>\n      <\u002Fdiv>\n      <h1 class=\"ds-doc-title\">LaundryLog Design System<\u002Fh1>\n      <p class=\"ds-doc-meta\">Extends <code style=\"font-family:var(--cb-font-mono);font-size:0.8em\">--cb-*<\u002Fcode> · Adds <code style=\"font-family:var(--cb-font-mono);font-size:0.8em\">--ll-*<\u002Fcode> tokens &nbsp;<span class=\"ds-version\">v1.0<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <button class=\"ds-theme-toggle\" id=\"themeToggle\"><span id=\"themeIcon\">☀️<\u002Fspan><span id=\"themeLabel\">Light<\u002Fspan><\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- ══ OVERVIEW ══ -->\n  <section class=\"ds-section\" id=\"overview\">\n    <h2 class=\"ds-section-title\">Overview<\u002Fh2>\n    <p class=\"ds-section-desc\">LaundryLog is an expense-logging mobile app for tracking laundromat costs. It extends the CheddarBooks base system with app-specific tokens and a set of purpose-built components. All --ll-* tokens fall back gracefully to --cb-* equivalents. No new primitives are introduced — only semantic extensions.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n      <div style=\"background:var(--cb-surface-raised);border:1px solid var(--cb-border-default);border-radius:var(--cb-radius-lg);padding:var(--cb-space-5);\">\n        <p style=\"font-size:var(--cb-text-xs);font-weight:var(--cb-weight-semibold);letter-spacing:var(--cb-tracking-wider);text-transform:uppercase;color:var(--cb-text-muted);margin-bottom:var(--cb-space-3);\">Inherits from CB<\u002Fp>\n        <ul style=\"list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;\">\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">All color semantic tokens<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Typography scale &amp; fonts<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Spacing, radius, shadows<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Motion &amp; focus tokens<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Button, input, badge, card<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:var(--cb-accent-subtle);border:1px solid var(--cb-border-accent);border-radius:var(--cb-radius-lg);padding:var(--cb-space-5);\">\n        <p style=\"font-size:var(--cb-text-xs);font-weight:var(--cb-weight-semibold);letter-spacing:var(--cb-tracking-wider);text-transform:uppercase;color:var(--cb-text-accent);margin-bottom:var(--cb-space-3);\">LL adds<\u002Fp>\n        <ul style=\"list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;\">\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Machine type palette (washer / dryer / supplies)<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">App header gradient tokens<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Stepper &amp; coin control tokens<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Quick-fill chip palette<\u002Fli>\n          <li style=\"font-size:var(--cb-text-sm);color:var(--cb-text-secondary);\">Session bar &amp; entry card tokens<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══ TOKENS ══ -->\n  <section class=\"ds-section\" id=\"tokens\">\n    <h2 class=\"ds-section-title\">--ll-* Token Reference<\u002Fh2>\n    <p class=\"ds-section-desc\">All LaundryLog-specific tokens. Each carries a light-mode and dark-mode value. Tokens that simply alias --cb-* are marked as inherited.<\u002Fp>\n\n    <div class=\"ds-subsection\">\n      <div class=\"ds-subsection-title\">Machine Type Palette<\u002Fdiv>\n      <div class=\"ds-preview ds-preview--center\" style=\"gap: 32px;\">\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-washer-color)\"><\u002Fdiv><span class=\"ds-swatch-label\">washer-color<\u002Fspan><\u002Fdiv>\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-washer-subtle)\"><\u002Fdiv><span class=\"ds-swatch-label\">washer-subtle<\u002Fspan><\u002Fdiv>\n        <div style=\"width:1px;height:40px;background:var(--cb-border-default)\"><\u002Fdiv>\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-dryer-color)\"><\u002Fdiv><span class=\"ds-swatch-label\">dryer-color<\u002Fspan><\u002Fdiv>\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-dryer-subtle)\"><\u002Fdiv><span class=\"ds-swatch-label\">dryer-subtle<\u002Fspan><\u002Fdiv>\n        <div style=\"width:1px;height:40px;background:var(--cb-border-default)\"><\u002Fdiv>\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-supplies-color)\"><\u002Fdiv><span class=\"ds-swatch-label\">supplies-color<\u002Fspan><\u002Fdiv>\n        <div class=\"ds-swatch-item\"><div class=\"ds-swatch\" style=\"width:48px;height:48px;border-radius:12px;background:var(--ll-supplies-subtle)\"><\u002Fdiv><span class=\"ds-swatch-label\">supplies-subtle<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <table class=\"ds-token-table\">\n        <thead><tr><th>Token<\u002Fth><th>Light<\u002Fth><th>Dark<\u002Fth><th>Intent<\u002Fth><\u002F 04 290)<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">oklch(16% .05 290)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Supplies chip background<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"ds-subsection\">\n      <div class=\"ds-subsection-title\">App &amp; UI Tokens<\u002Fdiv>\n      <table class=\"ds-token-table\">\n        <thead><tr><th>Token<\u002Fth><th>Light value<\u002Fth><th>Intent<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><span class=\"ds-token-name\">--ll-header-from<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">var(--cb-amber-300)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Header gradient start<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-header-to<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">var(--cb-amber-500)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Header gradient end<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-header-text<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">white<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Header text color<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-session-bg<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">var(--cb-amber-50)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Session bar background<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-session-border<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">var(--cb-amber-300)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Session bar border<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-session-text<\u002Fspan><\u002Ftd><td><span class=\"ds-token-value\">var(--cb-amber-700)<\u002Fspan><\u002Ftd><td class=\"ds-token-desc\">Session bar labels &amp; amount<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"ds-token-name\">--ll-coin-size<\u002Fspan><\u002Ftd><td><span class=
